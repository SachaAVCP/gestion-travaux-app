name: Claude Code

# Déclenche Claude Code quand "@claude" est mentionné dans :
#  - une nouvelle issue (brief envoyé par Computer)
#  - un commentaire d'issue
#  - un commentaire de revue de PR
#  - une assignation d'issue
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    # Ne s'exécute que si "@claude" est présent dans le texte déclencheur
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Règles AVCP transmises à Claude Code à chaque exécution.
          # Claude lit aussi le fichier CLAUDE.md à la racine du repo s'il existe.
          claude_args: >-
            --max-turns 15
          # Instructions par défaut (surchargées/complétées par le brief de l'issue)
          # IMPORTANT règles AVCP :
          #  - Toujours travailler sur la branche 'dev', jamais directement sur 'main'.
          #  - Ouvrir une Pull Request vers 'dev' (staging). La fusion vers 'main' (prod) reste manuelle.
          #  - Pas d'opérations interactives H100 (SSH, Dify DB, Docker, .env) — code/PR/refactoring/audit uniquement.
